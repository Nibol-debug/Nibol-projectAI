<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <!-- Menghubungkan file CSS eksternal -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Import font dari Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />

     <link rel="icon" type="image/png" href="image/logov4.png">
</head>

<body>

  <div class="custom-cursor" id="customCursor"></div>
  <div class="custom-cursor-ring" id="customCursorRing"></div>

  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="card">
    <div class="card-header">
      <div class="logo">⬡</div>
      <h1>Selamat Datang</h1>
      <p>Masuk ke akun kamu</p>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Masukkan username" autocomplete="off" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Masukkan password" />
    </div>

    <!-- Pesan error akan muncul di sini kalau login gagal -->
    <p id="error-msg"></p>

    <button id="btn-login" onclick="cekLogin()">Masuk</button>
  </div>

  <!-- Menghubungkan file JavaScript eksternal -->
  <script src="js/script.js"></script>

</body>

</html>
