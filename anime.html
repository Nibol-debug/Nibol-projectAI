<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Anime Nibol | Ocean Collection</title>
  <meta name="description" content="Personal top 100 anime collection with an ocean-themed design. Curated list featuring the best anime series and movies.">
  <link rel="stylesheet" href="css/anime.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Custom Cursor -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Ocean Background -->
  <div class="ocean-bg">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>
  <div class="light-rays"></div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Hero -->
    <section class="hero" id="heroSection">
      <h1 class="hero-title">🌊 My Anime Nibol</h1>
      <p class="hero-subtitle">— Top 100 Personal Favorites —</p>
      <div class="hero-divider"></div>
      <div class="hero-stats">
        <div class="stat-item">
          <span class="stat-number" id="totalAnime">0</span>
          <span class="stat-label">Total Anime</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="avgScore">0.0</span>
          <span class="stat-label">Avg Score</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="totalEpisodes">0</span>
          <span class="stat-label">Episodes</span>
        </div>
      </div>
    </section>

    <!-- Controls -->
    <div class="controls-bar" id="controlsBar">
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search anime...">
      </div>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="TV">TV</button>
      <button class="filter-btn" data-filter="Movie">Movie</button>
      <button class="filter-btn" data-filter="OVA">OVA</button>
      <div class="view-toggle">
        <button class="view-btn active" data-view="grid" title="Grid View">⊞</button>
        <button class="view-btn" data-view="list" title="List View">☰</button>
      </div>
    </div>

    <!-- Anime Grid -->
    <div class="anime-grid-container">
      <div class="anime-grid" id="animeGrid">
        <div class="loading-container" id="loadingState">
          <div class="loading-spinner"></div>
          <div class="loading-text">Diving into the ocean of anime...</div>
          <div class="loading-progress">
            <div class="loading-progress-bar" id="progressBar"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>Data from <a href="https://myanimelist.net" target="_blank" rel="noopener">MyAnimeList</a> via <a href="https://jikan.moe" target="_blank" rel="noopener">Jikan API</a></p>
    </footer>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent">
      <button class="modal-close" id="modalClose">✕</button>
    </div>
  </div>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" title="Back to top">↑</button>

  <script src="js/anime.js"></script>
</body>

</html>
